<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Restaurant Order UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

    <div class="flex gap-6">

        <!-- ================= MENU ================= -->
        <div class="w-1/2 bg-white p-4 rounded-lg shadow">

            <h1 class="text-2xl font-bold mb-4">Menu</h1>

            <ul id="menu-items" class="space-y-2">
                {% for category in categories %}
                {% for item in category.items.all %}

                <li class="cursor-pointer p-2 border rounded hover:bg-green-100" data-item-id="{{ item.id }}"
                    data-item-price="{{ item.price }}">

                    {{ item.name }} : Rs.{{ item.price }}

                </li>

                {% endfor %}
                {% endfor %}

            </ul>
        </div>

        <!-- ================= SELECTED ITEMS ================= -->
        <div class="w-1/2 bg-white p-4 rounded-lg shadow">

            <h1 class="text-2xl font-bold mb-4">Selected Items</h1>
            <ul id="selected-menu-items" class="space-y-2"></ul>
            <!-- TOTAL -->
            <form class="mt-4 border-t pt-3 text-xl font-bold" method="post">
                {% csrf_token %}
                Total: Rs. <span id="total-price" class="text-xl font-bold">0</span>

                <input id="order-items" type="hidden" name="order-items" value="">

                <button id="submit-order" class="mt-4 w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
                    Place Order
                </button>

            </form>
            <!-- SUBMIT -->


        </div>
    </div>

    <!-- ================= SCRIPT ================= -->
    <script>
        const menuItems = document.getElementById("menu-items");
        const selectedMenuItems = document.getElementById("selected-menu-items");
        const totalPriceDisplay = document.getElementById("total-price");
        const submitBtn = document.getElementById("submit-order");
        const currentTableId = "{{ table_id }}";

        // CART STATE
        const cart = {};

        /* ================= ADD ITEM ================= */
        menuItems.addEventListener("click", (event) => {
            if (event.target.tagName === "LI") {

                const name = event.target.innerText.split("-")[0].trim();
                const price = parseInt(event.target.getAttribute("data-item-price"));
                const item_id = parseInt(event.target.getAttribute("data-item-id"));

                if (!cart[name]) {
                    cart[name] = {item_id: item_id, price, qty: 1 };
                } else {
                    cart[name].qty += 1;
                }

                renderCart();
            }
        });

        /* ================= INCREASE ================= */
        function increaseItem(name) {
            cart[name].qty += 1;
            renderCart();
        }

        /* ================= DECREASE ================= */
        function decreaseItem(name) {
            cart[name].qty -= 1;

            if (cart[name].qty <= 0) {
                delete cart[name];
            }

            renderCart();
        }

        /* ================= RENDER ================= */
        function renderCart() {
            selectedMenuItems.innerHTML = "";

            let total = 0;

            Object.entries(cart).forEach(([name, item]) => {

                const itemTotal = item.price * item.qty;
                total += itemTotal;

                selectedMenuItems.innerHTML += `
            <li class="flex justify-between items-center border p-2 rounded">

                <div>
                    <div class="font-semibold">${name}</div>
                    <div class="text-sm text-gray-500">
                        Rs.${item.price} × ${item.qty} = Rs.${itemTotal}
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <button onclick="decreaseItem('${name}')"
                        class="px-2 py-1 bg-red-500 text-white rounded">
                        -
                    </button>

                    <span class="w-6 text-center">${item.qty}</span>

                    <button onclick="increaseItem('${name}')"
                        class="px-2 py-1 bg-green-500 text-white rounded">
                        +
                    </button>
                </div>

            </li>
        `;
            });

            totalPriceDisplay.innerText = total;
        }

        /* ================= SUBMIT ORDER ================= */
        submitBtn.addEventListener("click", () => {
            const orderPayload = {
                table_id: currentTableId,
                items: Object.entries(cart).map(([name, item]) => ({
                    item_id: item.item_id,
                    quantity: item.qty
                }))
            };
            console.log(orderPayload);

            console.log("ORDER PAYLOAD:", orderPayload);
            document.getElementById("order-items").value = JSON.stringify(orderPayload)

            // Example Django request:
            /*
            fetch("/create-order/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: JSON.stringify(orderPayload)
            });
            */
        });

    </script>

</body>

</html>
