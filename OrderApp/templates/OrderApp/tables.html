<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body>
    <div class="min-h-screen bg-gray-100 p-4">

        <!-- Header / User Info -->
        <div class="bg-white shadow rounded-2xl p-4 mb-6 text-center">

            <h1 class="text-3xl font-bold text-gray-800">
                Welcome, {{ request.user.username }}
            </h1>

            <p class="text-lg text-gray-600 mt-1">
                {{ request.user.first_name }} {{ request.user.last_name }}
            </p>

            <span class="inline-block mt-2 px-4 py-1 rounded-full bg-blue-100 text-blue-700 font-semibold">
                {{ request.user.get_role_display }}
            </span>

        </div>

        <!-- Section Title -->
        <h2 class="text-2xl font-bold text-gray-800 mb-4">
            Select a Table
        </h2>

        <!-- Tables Grid -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">

            {% for table in tables %}

            <a href="#"
                class="bg-white rounded-2xl shadow-md hover:shadow-xl transition transform hover:scale-105 active:scale-95 p-6 flex items-center justify-center">

                <div class="text-center">
                    <div class="text-2xl font-extrabold text-gray-800">
                        {{ table.name }}
                    </div>
                    <div class="text-sm text-gray-500 mt-1">
                        Tap to select
                    </div>
                </div>

            </a>

            {% endfor %}

        </div>

    </div>

</body>

</html>
