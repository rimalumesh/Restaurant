<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100">

  <div class="w-full max-w-sm p-6 bg-white rounded-lg shadow">
    <h2 class="mb-6 text-2xl font-semibold text-center">Login</h2>
    {% for message in messages %}
    <p class="text-red-600">{{message}}</p>
    {% endfor %}
    <form class="space-y-4" method="post">
      {% csrf_token %}
      <div>
        <label class="block mb-1 text-sm font-medium text-gray-700">
          Username
        </label>
        <input type="text" placeholder="Enter username"
          class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          name="username" />
      </div>

      <div>
        <label class="block mb-1 text-sm font-medium text-gray-700">
          Password
        </label>

        <div class="relative">
          <input type="password" placeholder="Enter password"
            class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            name="password" id="password-field" />
          <i onclick="togglePassword()" class="fa fa-eye absolute top-3 right-2"
            aria-hidden="true" id = "toggle-icon"></i>

        </div>


      </div>

      <div class="flex items-center">
        <input id="remember" name="remember_me" type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded" />
        <label for="remember" class="ml-2 text-sm text-gray-700">
          Remember me
        </label>
      </div>

      <button type="submit" class="w-full py-2 font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700">
        Login
      </button>
    </form>
  </div>


  <script>
    function togglePassword() {
      const passwordField = document.getElementById("password-field")
      const toggleIcon = document.getElementById("toggle-icon")

      if (passwordField.type == "password"){
          passwordField.type = "text"
          toggleIcon.classList.remove("fa-eye")
          toggleIcon.classList.add("fa-eye-slash")
      } else {
        passwordField.type = "password"
        toggleIcon.classList.remove("fa-eye-slash")
          toggleIcon.classList.add("fa-eye")
      }
      
    }
  </script>
</body>

</html>
